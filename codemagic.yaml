#  CalvoNote Mobile — codemagic.yaml
#  Configuration build cloud (Codemagic CI/CD)
#  DevLab · 2026
# ══════════════════════════════════════════════════════════════════════════

workflows:

  android-debug:
    name: CalvoNote Android — Debug APK
    max_build_duration: 30        # minutes max avant timeout
    instance_type: mac_mini_m1   # machine de build Codemagic (gratuite)

    environment:
      java: 17
      android_signing:
        - CalvoNote_keystore       # pas utilisé en debug, ignoré
      vars:
        PACKAGE_NAME: "com.devlab.calvonote"

    scripts:
      # ── Étape 1 : rendre Gradle exécutable ──────────────────────────────
      - name: Permissions Gradle
        script: |
          chmod +x gradlew

      # ── Étape 2 : compilation APK debug ─────────────────────────────────
      - name: Build APK debug
        script: |
          ./gradlew assembleDebug \
            --stacktrace \
            --no-daemon

    # ── Artefact récupérable après le build ─────────────────────────────
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk

    # ── Notification email (optionnel) ───────────────────────────────────
    publishing:
      email:
        recipients:
          - calvonote.devlab@gmail.com
        notify:
          success: true
          failure: true
